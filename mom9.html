<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>عيد الأم السعيد</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;background:#1a0808;font-family:'Amiri',serif;overflow-x:hidden;}
.petals{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.petal{position:absolute;top:-40px;animation:fall linear infinite;opacity:.75;}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg);opacity:0;}}

.page{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:28px 16px 40px;}

.flower{font-size:44px;display:block;text-align:center;margin-bottom:8px;animation:sway 3s ease-in-out infinite;}
@keyframes sway{0%,100%{transform:rotate(-6deg);}50%{transform:rotate(6deg);}}
.ar-title{font-family:'Amiri',serif;font-size:clamp(28px,8vw,46px);color:#f9d5a7;font-weight:700;line-height:1.3;text-align:center;}
.fr-title{font-family:'Playfair Display',serif;font-size:clamp(13px,3.8vw,18px);color:#c49a6c;font-weight:400;letter-spacing:2px;direction:ltr;text-align:center;margin-top:4px;}
.divider{width:70px;height:1px;background:linear-gradient(90deg,transparent,#c8864a,transparent);margin:10px auto;}
.name{font-family:'Amiri',serif;font-size:clamp(26px,7vw,42px);color:#ffe8c8;font-weight:700;text-align:center;margin-bottom:16px;text-shadow:0 0 30px rgba(255,200,120,.4);}

/* VIDEO — full width, tall */
.video-wrap{
  width:100%;
  max-width:500px;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.8);
  background:#000;
}
.video-wrap video{
  width:100%;
  height:auto;
  min-height:55vw;
  max-height:80vh;
  display:block;
  object-fit:contain;
  background:#000;
}

.message{text-align:center;margin-top:22px;max-width:460px;padding:0 8px;}
.msg-ar{font-family:'Amiri',serif;font-size:clamp(16px,4.5vw,20px);color:#f0c897;line-height:2;margin-bottom:10px;}
.msg-fr{font-family:'Playfair Display',serif;font-size:clamp(13px,3.2vw,16px);color:#b8905a;font-style:italic;direction:ltr;line-height:1.8;}
.hearts{font-size:24px;margin-top:16px;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}
</style>
</head>
<body>
<div class="petals" id="petals"></div>
<div class="page">
  <span class="flower">🌸</span>
  <div class="ar-title">عيد الأم السعيد</div>
  <div class="fr-title">Bonne Fête des Mères</div>
  <div class="divider"></div>
  <div class="name">Sana 1</div>

  <div class="video-wrap">
    <video autoplay controls playsinline>
      <source src="mom9.mp4" type="video/mp4">
    </video>
  </div>

  <div class="message">
    <p class="msg-ar">هذه الرسالة مُهداة إليكِ بكلّ الحبّ والتقدير،<br>أنتِ نور حياتنا ودفء قلوبنا.</p>
    <p class="msg-fr">Ce message vous est offert avec tout l'amour du monde.<br>Vous êtes notre lumière, notre force et notre fierté.</p>
    <div class="hearts">💕 🌹 💕</div>
  </div>
</div>

<script>
const emojis=['🌸','🌺','🌹','🌼','💮'];
for(let i=0;i<16;i++){
  const p=document.createElement('div');
  p.className='petal';
  p.textContent=emojis[Math.floor(Math.random()*emojis.length)];
  p.style.left=Math.random()*100+'vw';
  p.style.animationDuration=(7+Math.random()*8)+'s';
  p.style.animationDelay=(-Math.random()*12)+'s';
  p.style.fontSize=(13+Math.random()*16)+'px';
  document.getElementById('petals').appendChild(p);
}
</script>
</body>
</html>
